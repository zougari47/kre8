services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

  dev:
    image: oven/bun:1-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    command: sh -c "bun install && bun run dev -- --host"
